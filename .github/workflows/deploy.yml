name: CI/CD Pipeline user-Service
on:
    push:
        branches: ["main"]
jobs:
    build-test-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v3

            - name: Setup Node.js
              uses: actions/setup-node@v3
              with:
                node-version: '18'
            
            - name: Cache npm
              uses: actions/cache@v3
              with:
                path: ~/.npm
                key: ${{runner.os}}-node-${{hashFiles('package-lock.json')}}


            - name: Install Dependencies
              run: npm install

            - name: Run Tests
              run: npm test
            
            
            - name: Build Docker Image
              run: docker build --pull -t ${{secrets.DOCKER_USERNAME}}/user-service:latest .

            - name: Login to DockerHub
              run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin
            
            - name: Push Image
              run: docker push ${{secrets.DOCKER_USERNAME}}/user-service:latest

            - name: Deploy to Azure VM
              uses: appleboy/ssh-action@v0.1.6
              with:
                host: ${{secrets.SERVER_HOST}}
                username: ${{secrets.SERVER_USER}}
                key: ${{secrets.SERVER_SSH_KEY}}
                script: |
                 docker pull ${{secrets.DOCKER_USERNAME}}/user-service:latest
                 docker stop user-service || true
                 docker rm user-service || true
                 docker run -d --env-file /home/azureuser/user.env -p 5001:5001 --restart unless-stopped --name user-service ${{secrets.DOCKER_USERNAME}}/user-service:latest