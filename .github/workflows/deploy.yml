name: CI/CD - user Service

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v3

      # =========================
      # 2. Setup Node
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      # =========================
      # 3. Cache npm
      # =========================
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      # =========================
      # 4. Install + Test
      # =========================
      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      # =========================
      # 5. Build Docker Image
      # =========================
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest .

      # =========================
      # 6. Login DockerHub
      # =========================
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # =========================
      # 7. Push Image
      # =========================
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest

      # =========================
      # 8. Trigger Deploy Repo 
      # =========================
      - name: Trigger Deployment
        run: |
          curl -X POST https://api.github.com/repos/gagan-upadhyay/expense-tracker-deploy/dispatches \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: token ${{ secrets.DEPLOY_REPO_TOKEN }}" \
          -d '{"event_type":"deploy"}'